<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobTrack — Analytics & War Room</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e8ec;--muted:#6b6b7a;--accent:#c8f064;--applied:#3d7fff;--interview:#f5a623;--offer:#4cd964;--rejected:#ff453a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}.logo span{color:var(--accent);}
  .nav{display:flex;gap:4px;}.nav a{padding:6px 14px;border-radius:8px;font-size:13px;color:var(--muted);text-decoration:none;transition:all 0.15s;}.nav a:hover{color:var(--text);background:var(--surface);}.nav a.active{color:var(--text);background:var(--surface2);}
  .header-right{display:flex;gap:10px;align-items:center;}
  .user-badge{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;}
  .btn-logout{padding:6px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
  .btn-logout:hover{border-color:var(--border2);color:var(--text);}
  main{padding:28px 32px;}
  /* War Room */
  .war-room{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;}
  .war-room-header{display:flex;align-items:flex-end;gap:24px;margin-bottom:24px;flex-wrap:wrap;}
  .war-room-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
  .war-room-sub{font-size:13px;color:var(--muted);}
  .level-display{display:flex;flex-direction:column;gap:8px;flex:1;min-width:200px;}
  .level-top{display:flex;justify-content:space-between;align-items:baseline;}
  .level-num{font-family:'DM Serif Display',serif;font-size:36px;color:var(--accent);line-height:1;}
  .level-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
  .xp-bar-big{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:4px;}
  .xp-fill-big{height:100%;background:var(--accent);border-radius:5px;transition:width 1s ease;}
  .xp-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
  .badges-section{margin-top:4px;}
  .badges-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-family:'DM Mono',monospace;margin-bottom:12px;}
  .badges-grid{display:flex;flex-wrap:wrap;gap:10px;}
  .badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;min-width:90px;text-align:center;transition:border-color 0.15s;}
  .badge-item.earned{border-color:rgba(200,240,100,0.3);background:rgba(200,240,100,0.05);}
  .badge-item.locked{opacity:0.35;filter:grayscale(1);}
  .badge-icon{font-size:24px;line-height:1;}
  .badge-name{font-size:11px;color:var(--text);font-weight:500;}
  .badge-desc{font-size:10px;color:var(--muted);line-height:1.3;}
  /* Stats */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-family:'DM Mono',monospace;margin-bottom:8px;}
  .kpi-value{font-family:'DM Serif Display',serif;font-size:32px;line-height:1;margin-bottom:4px;}
  .kpi-sub{font-size:12px;color:var(--muted);}
  .kpi-value.accent{color:var(--accent)}.kpi-value.offer{color:var(--offer)}.kpi-value.interview{color:var(--interview)}.kpi-value.applied{color:var(--applied);}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;}
  .chart-card.full{grid-column:1/-1;}
  .chart-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:18px;color:var(--text);}
  .chart-wrap{position:relative;height:220px;}
  .companies-list{display:flex;flex-direction:column;gap:10px;}
  .company-row{display:flex;align-items:center;gap:12px;}
  .company-name{font-size:13px;color:var(--text);width:140px;flex-shrink:0;font-family:'DM Mono',monospace;}
  .company-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;}
  .company-bar{height:100%;background:var(--accent);border-radius:4px;transition:width 0.6s ease;}
  .company-count{font-size:12px;color:var(--muted);width:24px;text-align:right;font-family:'DM Mono',monospace;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="logo">Job<span>Track</span></div>
  <nav class="nav"><a href="/dashboard">Dashboard</a><a href="/analytics" class="active">Analytics</a></nav>
  <div class="header-right">
    <span class="user-badge">{{ username }}</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<main id="main-content">
  <div class="empty-state"><p style="color:var(--muted);font-family:'DM Mono',monospace;">Loading...</p></div>
</main>

<script>
async function logout(){await fetch('/api/logout',{method:'POST'});window.location.href='/login';}

const ALL_BADGES=[
  {id:'first_step',name:'First Step',desc:'Submit first app',icon:'🚀'},
  {id:'persistence',name:'Persistence King',desc:'10 applications',icon:'👑'},
  {id:'hustler',name:'Hustler',desc:'25 applications',icon:'⚡'},
  {id:'interview_ace',name:'Interview Ace',desc:'First interview',icon:'🎯'},
  {id:'multi_interview',name:'In Demand',desc:'3 interviews',icon:'🔥'},
  {id:'offer_getter',name:'Offer Getter',desc:'First offer',icon:'💎'},
  {id:'resilient',name:'Resilient',desc:'5 rejections',icon:'🛡️'},
  {id:'debriefer',name:'Debriefer',desc:'First debrief',icon:'📝'},
];

async function loadAnalytics(){
  const res=await fetch('/api/stats');
  if(res.status===401){window.location.href='/login';return;}
  const data=await res.json();
  const xp=data.xp||{};
  const status=data.status||{};
  const applied=status['Applied']||0,interview=status['Interview']||0,offer=status['Offer']||0,rejected=status['Rejected']||0;
  const total=data.total||0;

  const earnedIds=new Set((xp.badges||[]).map(b=>b.id));

  document.getElementById('main-content').innerHTML=`
    <div class="war-room">
      <div class="war-room-header">
        <div><div class="war-room-title">War Room</div><div class="war-room-sub">Your job search journey, gamified</div></div>
        <div class="level-display">
          <div class="level-top"><span class="level-num">Lvl ${xp.level||1}</span><span class="level-label">${xp.xp||0} XP total</span></div>
          <div class="xp-bar-big"><div class="xp-fill-big" style="width:${xp.xp_in_level||0}%"></div></div>
          <div class="xp-sub">${xp.xp_in_level||0}/100 XP to next level</div>
        </div>
      </div>
      <div class="badges-section">
        <div class="badges-title">Badges — ${earnedIds.size}/${ALL_BADGES.length} earned</div>
        <div class="badges-grid">
          ${ALL_BADGES.map(b=>`
            <div class="badge-item ${earnedIds.has(b.id)?'earned':'locked'}">
              <div class="badge-icon">${b.icon}</div>
              <div class="badge-name">${b.name}</div>
              <div class="badge-desc">${b.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    ${total===0?`<div class="empty-state"><p style="font-size:18px;color:var(--text);margin-bottom:8px;">No data yet</p><p>Add applications on the <a href="/dashboard">Dashboard</a>.</p></div>`:`
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total applications</div><div class="kpi-value accent">${total}</div><div class="kpi-sub">All time</div></div>
      <div class="kpi"><div class="kpi-label">Interview rate</div><div class="kpi-value interview">${data.interview_rate}%</div><div class="kpi-sub">Got to interview</div></div>
      <div class="kpi"><div class="kpi-label">Offer rate</div><div class="kpi-value offer">${data.success_rate}%</div><div class="kpi-sub">Converted to offer</div></div>
      <div class="kpi"><div class="kpi-label">Active</div><div class="kpi-value applied">${applied+interview}</div><div class="kpi-sub">Applied + interviewing</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Status breakdown</div><div class="chart-wrap"><canvas id="donut-chart"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Top companies</div><div class="companies-list" id="companies-list"></div></div>
      <div class="chart-card full"><div class="chart-title">Applications over time</div><div class="chart-wrap"><canvas id="line-chart"></canvas></div></div>
    </div>`}`;

  if(total===0)return;

  Chart.defaults.color='#6b6b7a';
  Chart.defaults.font={family:"'DM Sans', sans-serif",size:12};

  new Chart(document.getElementById('donut-chart'),{
    type:'doughnut',
    data:{labels:['Applied','Interview','Offer','Rejected'],datasets:[{data:[applied,interview,offer,rejected],backgroundColor:['#3d7fff','#f5a623','#4cd964','#ff453a'],borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{padding:16,usePointStyle:true,pointStyleWidth:8}}}}
  });

  const timeline=data.timeline||{};
  const timeKeys=Object.keys(timeline).sort();
  if(timeKeys.length){
    new Chart(document.getElementById('line-chart'),{
      type:'bar',
      data:{labels:timeKeys,datasets:[{label:'Applications',data:timeKeys.map(k=>timeline[k]),backgroundColor:'rgba(200,240,100,0.25)',borderColor:'#c8f064',borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{maxTicksLimit:10}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{stepSize:1},beginAtZero:true}}}
    });
  }

  const companies=data.top_companies||[];
  const maxC=companies.length?Math.max(...companies.map(c=>c.count)):1;
  document.getElementById('companies-list').innerHTML=companies.length
    ?companies.map(c=>`<div class="company-row"><div class="company-name">${esc(c.company)}</div><div class="company-bar-wrap"><div class="company-bar" style="width:${Math.round((c.count/maxC)*100)}%"></div></div><div class="company-count">${c.count}</div></div>`).join('')
    :'<div style="color:var(--muted);font-size:13px;">No data yet</div>';
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
loadAnalytics();
</script>
</body>
</html>
